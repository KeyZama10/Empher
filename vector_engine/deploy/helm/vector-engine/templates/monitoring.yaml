{{- if .Values.monitoring.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector-engine.fullname" . }}-prometheus-config
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "vector-search-engine-coordinators"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: coordinator
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-engine.fullname" . }}-prometheus
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: prometheus
spec:
  ports:
    - name: web
      port: 9090
      targetPort: 9090
  selector:
    {{- include "vector-engine.selectorLabels" . | nindent 4 }}
    app: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-engine.fullname" . }}-prometheus
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vector-engine.selectorLabels" . | nindent 6 }}
      app: prometheus
  template:
    metadata:
      labels:
        {{- include "vector-engine.selectorLabels" . | nindent 8 }}
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "vector-engine.fullname" . }}-prometheus-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector-engine.fullname" . }}-grafana-datasources-config
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: grafana
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "vector-engine.fullname" . }}-prometheus-service:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector-engine.fullname" . }}-grafana-dashboards-config
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'VectorSearchEngine'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafton --",
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "title": "Throughput (QPS)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(vector_search_requests_total[1m])) by (kubernetes_pod_name)",
              "legendFormat": "{{kubernetes_pod_name}} QPS",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "reqps"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "title": "Search Latency",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "rate(vector_search_latency_seconds_sum[1m]) / rate(vector_search_latency_seconds_count[1m]) * 1000",
              "legendFormat": "Avg Search Latency (ms)",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "ms"
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "title": "Cache Hit Rate (%)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(vector_search_cache_hits_total[1m])) by (kubernetes_pod_name) / (sum(rate(vector_search_cache_hits_total[1m])) by (kubernetes_pod_name) + sum(rate(vector_search_cache_misses_total[1m])) by (kubernetes_pod_name) + 0.0001) * 100",
              "legendFormat": "{{kubernetes_pod_name}} Hit Rate %",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "percent",
              "max": 100,
              "min": 0
            }
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "title": "Process Memory Usage",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "vector_search_memory_bytes / 1024 / 1024",
              "legendFormat": "{{kubernetes_pod_name}} Memory (MB)",
              "range": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth"
              },
              "unit": "decbytes"
            }
          }
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Vector Search Engine Dashboard",
      "version": 1
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-engine.fullname" . }}-grafana
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: grafana
spec:
  ports:
    - name: service
      port: 3000
      targetPort: 3000
  selector:
    {{- include "vector-engine.selectorLabels" . | nindent 4 }}
    app: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-engine.fullname" . }}-grafana
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vector-engine.selectorLabels" . | nindent 6 }}
      app: grafana
  template:
    metadata:
      labels:
        {{- include "vector-engine.selectorLabels" . | nindent 8 }}
        app: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}"
          ports:
            - name: service
              containerPort: 3000
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
          volumeMounts:
            - name: datasources-volume
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider-volume
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-template-volume
              mountPath: /var/lib/grafana/dashboards
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: datasources-volume
          configMap:
            name: {{ include "vector-engine.fullname" . }}-grafana-datasources-config
            items:
              - key: datasource.yml
                path: datasource.yml
        - name: dashboards-provider-volume
          configMap:
            name: {{ include "vector-engine.fullname" . }}-grafana-dashboards-config
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: dashboard-template-volume
          configMap:
            name: {{ include "vector-engine.fullname" . }}-grafana-dashboards-config
            items:
              - key: dashboard.json
                path: dashboard.json
{{- end -}}
