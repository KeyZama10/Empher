apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-engine.fullname" . }}-redis
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: redis
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    {{- include "vector-engine.selectorLabels" . | nindent 4 }}
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-engine.fullname" . }}-redis
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vector-engine.selectorLabels" . | nindent 6 }}
      app: redis
  template:
    metadata:
      labels:
        {{- include "vector-engine.selectorLabels" . | nindent 8 }}
        app: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
