apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-engine.fullname" . }}-etcd
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
    app: etcd
spec:
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  clusterIP: None
  selector:
    {{- include "vector-engine.selectorLabels" . | nindent 4 }}
    app: etcd
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vector-engine.fullname" . }}-etcd
  labels:
    {{- include "vector-engine.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "vector-engine.fullname" . }}-etcd
  replicas: {{ .Values.etcd.replicaCount }}
  selector:
    matchLabels:
      {{- include "vector-engine.selectorLabels" . | nindent 6 }}
      app: etcd
  template:
    metadata:
      labels:
        {{- include "vector-engine.selectorLabels" . | nindent 8 }}
        app: etcd
    spec:
      containers:
        - name: etcd
          image: "{{ .Values.etcd.image.repository }}:{{ .Values.etcd.image.tag }}"
          command:
            - etcd
            - --name
            - etcd-0
            - --initial-advertise-peer-urls
            - http://etcd-0.{{ include "vector-engine.fullname" . }}-etcd:2380
            - --listen-peer-urls
            - http://0.0.0.0:2380
            - --listen-client-urls
            - http://0.0.0.0:2379
            - --advertise-client-urls
            - http://{{ include "vector-engine.fullname" . }}-etcd:2379
            - --initial-cluster
            - etcd-0=http://etcd-0.{{ include "vector-engine.fullname" . }}-etcd:2380
            - --initial-cluster-state
            - new
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          resources:
            {{- toYaml .Values.etcd.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: etcd-data
              mountPath: /var/run/etcd
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.etcd.storage.storageClass }}
        storageClassName: "{{ .Values.etcd.storage.storageClass }}"
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.etcd.storage.size }}
