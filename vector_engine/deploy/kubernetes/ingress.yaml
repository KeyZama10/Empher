apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vector-engine-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  rules:
    - host: vector-engine.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coordinator-service
                port:
                  number: 8000
